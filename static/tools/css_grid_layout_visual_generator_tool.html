<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Master | Professional Layout Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #6366f1; }
        body { font-family: 'Outfit', sans-serif; background: #08090d; color: #e2e8f0; }
        .glass { 
            background: rgba(17, 24, 39, 0.6); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .grid-item { 
            background: rgba(99, 102, 241, 0.1); 
            border: 1px solid rgba(99, 102, 241, 0.3); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 500; 
            border-radius: 12px;
            color: #818cf8;
            transition: all 0.2s ease;
        }
        .grid-item:hover { background: rgba(99, 102, 241, 0.2); }
        input[type=range] { accent-color: #6366f1; cursor: pointer; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4750454395006570" crossorigin="anonymous"></script>

    <script defer src="/_vercel/insights/script.js"></script>

    <link rel="icon" type="image/png" href="/static/logo.png">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BZVWXPPG06"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BZVWXPPG06');
    </script>

    <script src="https://assets.lemonsqueezy.com/lemon.js" defer></script>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="navbar" style="display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid rgba(255,255,255,0.08); background: rgba(11, 15, 25, 0.7); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; font-family: 'Outfit', sans-serif;">
        <a href="/" style="display: flex; align-items: center; gap: 10px; color: #f3f4f6; text-decoration: none; font-weight: 600;">
            <img src="/static/logo.png" alt="Aegis Hub Logo" style="height: 30px;">
            <span>Aegis Developer Hub</span>
        </a>
        <a href="/" style="color: #60a5fa; text-decoration: none; font-size: 0.95rem;">&larr; Back to Hub</a>
    </div>
    

<nav class="max-w-6xl mx-auto mb-8 flex items-center justify-between glass px-6 py-4 rounded-2xl">
    <div class="text-xl font-bold tracking-tight">CSS<span class="text-indigo-500">Grid</span>Master</div>
    <div class="text-xs text-slate-400 font-medium tracking-wider uppercase">Productivity Utility</div>
</nav>

<main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
    <aside class="lg:col-span-1 space-y-6">
        <section class="glass p-6 rounded-2xl">
            <h2 class="text-lg font-semibold mb-6 flex items-center gap-2">
                <span class="w-1.5 h-6 bg-indigo-500 rounded-full"></span>Settings
            </h2>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm text-slate-400 mb-2">Columns: <span id="col-val" class="text-indigo-400 font-bold">3</span></label>
                    <input type="range" id="cols" min="1" max="10" value="3" class="w-full">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-2">Rows: <span id="row-val" class="text-indigo-400 font-bold">2</span></label>
                    <input type="range" id="rows" min="1" max="10" value="2" class="w-full">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-2">Gap: <span id="gap-val" class="text-indigo-400 font-bold">16</span>px</label>
                    <input type="range" id="gap" min="0" max="100" value="16" class="w-full">
                </div>
            </div>
        </section>

        <section class="glass p-6 rounded-2xl">
            <h2 class="text-lg font-semibold mb-4">Export CSS</h2>
            <pre id="css-output" class="bg-black/40 p-4 rounded-xl text-xs text-indigo-300 font-mono overflow-x-auto border border-white/5"></pre>
            <button id="copy-btn" class="mt-4 w-full py-2.5 bg-indigo-600 hover:bg-indigo-500 rounded-lg font-semibold text-sm transition-all shadow-lg active:scale-95">Copy Code</button>
        </section>
    </aside>

    <section class="lg:col-span-2 glass p-6 md:p-8 rounded-2xl flex flex-col">
        <div id="grid-preview" class="w-full h-full min-h-[500px]"></div>
    </section>
</main>

<script>
    const colInput = document.getElementById('cols');
    const rowInput = document.getElementById('rows');
    const gapInput = document.getElementById('gap');
    const grid = document.getElementById('grid-preview');
    const cssDisplay = document.getElementById('css-output');
    const copyBtn = document.getElementById('copy-btn');

    function updateGrid() {
        const cols = colInput.value;
        const rows = rowInput.value;
        const gap = gapInput.value;

        document.getElementById('col-val').textContent = cols;
        document.getElementById('row-val').textContent = rows;
        document.getElementById('gap-val').textContent = gap;

        grid.style.display = 'grid';
        grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        grid.style.gridTemplateRows = `repeat(${rows}, minmax(80px, 1fr))`;
        grid.style.gap = `${gap}px`;

        grid.innerHTML = '';
        for (let i = 0; i < cols * rows; i++) {
            const div = document.createElement('div');
            div.className = 'grid-item';
            div.textContent = `${i + 1}`;
            grid.appendChild(div);
        }

        const css = `.grid-container {
  display: grid;
  grid-template-columns: repeat(${cols}, 1fr);
  grid-template-rows: repeat(${rows}, auto);
  gap: ${gap}px;
}`;
        cssDisplay.textContent = css;
    }

    [colInput, rowInput, gapInput].forEach(el => el.addEventListener('input', updateGrid));

    copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(cssDisplay.textContent).then(() => {
            const originalText = copyBtn.textContent;
            copyBtn.textContent = 'Copied Successfully!';
            copyBtn.classList.replace('bg-indigo-600', 'bg-emerald-600');
            setTimeout(() => {
                copyBtn.textContent = originalText;
                copyBtn.classList.replace('bg-emerald-600', 'bg-indigo-600');
            }, 2000);
        });
    });

    // Initialize
    updateGrid();
</script>
</body>
</html>
