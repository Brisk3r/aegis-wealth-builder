<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevToolbox | HTML Entity Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }
        .glass { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        textarea { 
            resize: vertical; 
            transition: all 0.3s ease; 
        }
        textarea:focus { 
            outline: none; 
            border-color: #38bdf8; 
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); 
        }
        .btn-grad { background: linear-gradient(135deg, #0ea5e9, #6366f1); }
        .btn-grad:hover { opacity: 0.9; }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4750454395006570" crossorigin="anonymous"></script>

    <script defer src="/_vercel/insights/script.js"></script>

    <link rel="icon" type="image/png" href="/static/logo.png">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BZVWXPPG06"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BZVWXPPG06');
    </script>

    <script src="https://assets.lemonsqueezy.com/lemon.js" defer></script>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="navbar" style="display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid rgba(255,255,255,0.08); background: rgba(11, 15, 25, 0.7); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; font-family: 'Outfit', sans-serif;">
        <a href="/" style="display: flex; align-items: center; gap: 10px; color: #f3f4f6; text-decoration: none; font-weight: 600;">
            <img src="/static/logo.png" alt="Aegis Hub Logo" style="height: 30px;">
            <span>Aegis Developer Hub</span>
        </a>
        <a href="/" style="color: #60a5fa; text-decoration: none; font-size: 0.95rem;">&larr; Back to Hub</a>
    </div>
    
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-sky-400 to-indigo-400">DevToolbox</h1>
            <p class="text-slate-400 mt-2">Enterprise-Grade HTML Entity Processor</p>
        </header>

        <main class="glass rounded-3xl p-6 md:p-10 shadow-2xl">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label for="input" class="block text-sm font-semibold mb-2 text-slate-300">Input Data</label>
                    <textarea id="input" class="w-full h-64 p-4 rounded-xl bg-slate-900 border border-slate-700 text-sm font-mono text-slate-200" placeholder="Paste your text or HTML here..."></textarea>
                </div>
                <div>
                    <label for="output" class="block text-sm font-semibold mb-2 text-slate-300">Processed Output</label>
                    <textarea id="output" class="w-full h-64 p-4 rounded-xl bg-slate-900 border border-slate-700 text-sm font-mono text-emerald-400" readonly placeholder="Result will appear here..."></textarea>
                </div>
            </div>

            <div class="flex flex-wrap gap-4 justify-center">
                <button onclick="process('encode')" class="btn-grad px-8 py-3 rounded-full font-semibold shadow-lg transition-transform hover:scale-105 active:scale-95">Encode Entities</button>
                <button onclick="process('decode')" class="bg-slate-700 hover:bg-slate-600 px-8 py-3 rounded-full font-semibold transition-transform hover:scale-105 active:scale-95">Decode Entities</button>
                <button onclick="copyToClipboard()" id="copyBtn" class="bg-gray-800 hover:bg-gray-700 px-8 py-3 rounded-full font-semibold border border-slate-600 transition-all">Copy Result</button>
            </div>
        </main>

        <footer class="mt-12 text-center text-slate-500 text-sm">
            &copy; 2026 DevToolbox Utility Suite • High-Performance Local Computation
        </footer>
    </div>

    <script>
        const inputArea = document.getElementById('input');
        const outputArea = document.getElementById('output');
        const copyBtn = document.getElementById('copyBtn');

        /**
         * Real-time encoding/decoding using native Browser APIs.
         * Encoding uses character code mapping. 
         * Decoding uses a persistent DOM element context for sanitization/parsing.
         */
        function process(mode) {
            const raw = inputArea.value;
            if (!raw) return;

            if (mode === 'encode') {
                outputArea.value = raw.replace(/[\u00A0-\u9999<>\&"']/g, i => '&#' + i.charCodeAt(0) + ';');
            } else {
                const doc = document.createElement('textarea');
                doc.innerHTML = raw;
                outputArea.value = doc.value;
            }
        }

        async function copyToClipboard() {
            if (!outputArea.value) return;
            try {
                await navigator.clipboard.writeText(outputArea.value);
                const originalText = copyBtn.innerText;
                copyBtn.innerText = 'Copied!';
                copyBtn.classList.add('bg-emerald-900', 'border-emerald-700');
                
                setTimeout(() => {
                    copyBtn.innerText = originalText;
                    copyBtn.classList.remove('bg-emerald-900', 'border-emerald-700');
                }, 2000);
            } catch (err) {
                alert('Failed to copy text.');
            }
        }
    </script>
</body>
</html>
