<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowState: Developer Productivity</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; line-height: 1.6; }
        .container { width: 100%; max-width: 600px; }
        .card { background: var(--card); padding: 2rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        h1 { color: var(--accent); margin-top: 0; }
        .btn { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin: 5px; }
        #journal { width: 100%; height: 100px; background: #0f172a; color: #fff; border: 1px solid #334155; padding: 10px; border-radius: 6px; margin: 10px 0; box-sizing: border-box; }
        .log { margin-top: 20px; border-top: 1px solid #334155; padding-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container card">
        <h1>FlowState Journal</h1>
        <p>Before switching branches or contexts, document your current focus to minimize cognitive load.</p>
        <textarea id="journal" placeholder="What are you working on? Write one sentence to resume later..."></textarea>
        <button class="btn" onclick="saveLog()">Save Context</button>
        <div id="logArea" class="log"></div>
    </div>
    <script>
        const logs = JSON.parse(localStorage.getItem('flow_logs') || '[]');
        function render() {
            document.getElementById('logArea').innerHTML = logs.map(l => `<div><strong>${l.time}:</strong> ${l.text}</div>`).join('');
        }
        function saveLog() {
            const txt = document.getElementById('journal').value;
            if(!txt) return;
            logs.unshift({time: new Date().toLocaleTimeString(), text: txt});
            localStorage.setItem('flow_logs', JSON.stringify(logs.slice(0, 5)));
            document.getElementById('journal').value = '';
            render();
        }
        render();
    </script>
</body>
</html>
