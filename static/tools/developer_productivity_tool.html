<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowState Professional | Aegis Dev Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Outfit', 'sans-serif'] } } } }
    </script>
    <style>
        body { background-color: #05070a; color: #e5e7eb; }
        .glass { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .toast { transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .progress-circle { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4750454395006570" crossorigin="anonymous"></script>

    <script defer src="/_vercel/insights/script.js"></script>

    <link rel="icon" type="image/png" href="/static/logo.png">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BZVWXPPG06"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BZVWXPPG06');
    </script>

    <script src="https://assets.lemonsqueezy.com/lemon.js" defer></script>
</head>
<body class="font-sans min-h-screen flex flex-col p-4 md:p-8">

    <div class="navbar" style="display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid rgba(255,255,255,0.08); background: rgba(11, 15, 25, 0.7); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; font-family: 'Outfit', sans-serif;">
        <a href="/" style="display: flex; align-items: center; gap: 10px; color: #f3f4f6; text-decoration: none; font-weight: 600;">
            <img src="/static/logo.png" alt="Aegis Hub Logo" style="height: 30px;">
            <span>Aegis Developer Hub</span>
        </a>
        <a href="/" style="color: #60a5fa; text-decoration: none; font-size: 0.95rem;">&larr; Back to Hub</a>
    </div>
    
    
    <!-- Toast Notification -->
    <div id="toast" class="fixed top-6 right-6 z-[100] bg-blue-500 text-white px-6 py-3 rounded-2xl shadow-2xl translate-y-[-150%] opacity-0 toast font-medium flex items-center gap-2">
        <i data-lucide="check-circle-2" class="w-5 h-5"></i> <span id="toastMsg">Action Successful</span>
    </div>

    <main class="max-w-6xl mx-auto w-full">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-400">FlowState Pro</h1>
                <p class="text-gray-500 mt-1">Deep work orchestration & context management</p>
            </div>
            <div class="flex gap-3">
                <button onclick="downloadAllLogs()" class="flex items-center gap-2 px-4 py-2 bg-white/5 hover:bg-white/10 rounded-xl transition border border-white/5 text-sm font-medium">
                    <i data-lucide="download" class="w-4 h-4"></i> Export
                </button>
                <button onclick="clearAllData()" class="flex items-center gap-2 px-4 py-2 bg-red-500/10 text-red-400 hover:bg-red-500/20 rounded-xl transition border border-red-500/10 text-sm font-medium">
                    <i data-lucide="trash-2" class="w-4 h-4"></i> Reset
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-7 space-y-8">
                <div class="glass rounded-3xl p-8">
                    <h2 class="text-xl font-semibold mb-6 flex items-center gap-2"><i data-lucide="edit-3" class="w-5 h-5 text-blue-400"></i> New Context</h2>
                    <input id="contextBranch" class="w-full bg-black/20 border border-white/10 rounded-xl px-4 py-3 mb-4 focus:border-blue-500 outline-none transition" placeholder="Branch name...">
                    <textarea id="contextNotes" class="w-full h-32 bg-black/20 border border-white/10 rounded-xl px-4 py-3 mb-4 focus:border-blue-500 outline-none transition resize-none" placeholder="Context notes..."></textarea>
                    <button id="saveContextBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-semibold transition">Save Snapshot</button>
                </div>

                <div id="logsContainer" class="space-y-4"></div>
            </div>

            <div class="lg:col-span-5 space-y-8">
                <div class="glass rounded-3xl p-8 flex flex-col items-center">
                    <div class="relative w-48 h-48 flex items-center justify-center mb-6">
                        <svg class="w-full h-full rotate-[-90deg]">
                            <circle cx="96" cy="96" r="88" stroke="rgba(255,255,255,0.05)" stroke-width="8" fill="transparent" />
                            <circle id="timerRing" class="progress-circle" cx="96" cy="96" r="88" stroke="#3b82f6" stroke-width="8" stroke-dasharray="552.92" stroke-dashoffset="0" />
                        </svg>
                        <div class="absolute text-center">
                            <div id="timerDisplay" class="text-4xl font-bold tabular-nums">25:00</div>
                            <div id="timerState" class="text-[10px] uppercase tracking-widest text-blue-400 font-bold">Focus</div>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <button id="timerPlayBtn" class="p-4 bg-white text-black rounded-full hover:scale-105 transition"><i id="playIcon" data-lucide="play" class="w-6 h-6"></i></button>
                        <button id="timerResetBtn" class="p-4 bg-white/5 border border-white/10 rounded-full hover:bg-white/10 transition"><i data-lucide="rotate-ccw" class="w-5 h-5"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let logs = JSON.parse(localStorage.getItem('logs') || '[]');
        let timerSeconds = 1500, timerMax = 1500, isRunning = false, interval = null;

        const showToast = (msg) => {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            t.classList.remove('translate-y-[-150%]', 'opacity-0');
            setTimeout(() => { t.classList.add('translate-y-[-150%]', 'opacity-0'); }, 3000);
        };

        const render = () => {
            const cont = document.getElementById('logsContainer');
            cont.innerHTML = logs.map((l, i) => `
                <div class="glass p-6 rounded-2xl group relative">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-blue-400 font-bold text-sm">${l.branch}</span>
                        <div class="flex gap-2">
                            <button onclick="copyToClipboard('${btoa(l.notes)}')" class="opacity-0 group-hover:opacity-100 transition p-2 bg-white/5 rounded-lg"><i data-lucide="copy" class="w-4 h-4"></i></button>
                            <button onclick="deleteLog(${i})" class="opacity-0 group-hover:opacity-100 transition p-2 bg-red-500/10 text-red-400 rounded-lg"><i data-lucide="trash" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                    <p class="text-sm text-gray-400 leading-relaxed">${l.notes}</p>
                </div>
            `).join('');
            lucide.createIcons();
        };

        const copyToClipboard = (encoded) => {
            navigator.clipboard.writeText(atob(encoded));
            showToast("Copied to clipboard");
        };

        const deleteLog = (i) => { logs.splice(i, 1); localStorage.setItem('logs', JSON.stringify(logs)); render(); };
        
        const clearAllData = () => { if(confirm('Clear entire history?')) { localStorage.clear(); logs = []; render(); showToast('All data cleared'); } };

        const downloadAllLogs = () => {
            const blob = new Blob([JSON.stringify(logs, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'flowstate_export.json'; a.click();
            showToast('Download started');
        };

        document.getElementById('saveContextBtn').onclick = () => {
            const b = document.getElementById('contextBranch'), n = document.getElementById('contextNotes');
            if(!b.value || !n.value) return showToast('Fill all fields');
            logs.unshift({branch: b.value, notes: n.value, ts: new Date().toISOString()});
            localStorage.setItem('logs', JSON.stringify(logs));
            b.value = ''; n.value = ''; render(); showToast('Snapshot saved');
        };

        setInterval(() => {
            if(!isRunning) return;
            timerSeconds--;
            if(timerSeconds <= 0) { clearInterval(interval); isRunning = false; confetti(); showToast('Time up!'); }
            document.getElementById('timerDisplay').textContent = `${Math.floor(timerSeconds/60)}:${(timerSeconds%60).toString().padStart(2,0)}`;
            const offset = 552.92 - ((timerSeconds/timerMax)*552.92);
            document.getElementById('timerRing').style.strokeDashoffset = offset;
        }, 1000);

        document.getElementById('timerPlayBtn').onclick = () => {
            isRunning = !isRunning;
            document.getElementById('playIcon').setAttribute('data-lucide', isRunning ? 'pause' : 'play');
            lucide.createIcons();
        };

        lucide.createIcons();
        render();
    </script>
</body>
</html>
