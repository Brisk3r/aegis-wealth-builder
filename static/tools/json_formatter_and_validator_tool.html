<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Formatter & Validator</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 800px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }
        .header {
            text-align: center;
            margin-bottom: 1rem;
        }
        .input-output {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .textarea {
            flex: 1;
            min-height: 200px;
            background-color: #1e1e1e;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 1rem;
            font-size: 1rem;
            resize: vertical;
        }
        .buttons {
            display: flex;
            justify-content: center;
            margin-top: 1rem;
        }
        button {
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4750454395006570" crossorigin="anonymous"></script>

    <script defer src="/_vercel/insights/script.js"></script>

    <link rel="icon" type="image/png" href="/static/logo.png">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BZVWXPPG06"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BZVWXPPG06');
    </script>

    <script src="https://assets.lemonsqueezy.com/lemon.js" defer></script>
</head>
<body>

    <div class="navbar" style="display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid rgba(255,255,255,0.08); background: rgba(11, 15, 25, 0.7); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; font-family: 'Outfit', sans-serif;">
        <a href="/" style="display: flex; align-items: center; gap: 10px; color: #f3f4f6; text-decoration: none; font-weight: 600;">
            <img src="/static/logo.png" alt="Aegis Hub Logo" style="height: 30px;">
            <span>Aegis Developer Hub</span>
        </a>
        <a href="/" style="color: #60a5fa; text-decoration: none; font-size: 0.95rem;">&larr; Back to Hub</a>
    </div>
    
    <div class="container">
        <div class="header">
            <h1>JSON Formatter & Validator</h1>
        </div>
        <div class="input-output">
            <textarea id="jsonInput" class="textarea" placeholder="Enter JSON here..."></textarea>
            <textarea id="jsonOutput" class="textarea" readonly></textarea>
        </div>
        <div class="buttons">
            <button onclick="formatJSON()">Format</button>
            <button onclick="validateJSON()">Validate</button>
        </div>
    </div>

    <script>
        function formatJSON() {
            const input = document.getElementById('jsonInput').value;
            try {
                const parsed = JSON.parse(input);
                const formatted = JSON.stringify(parsed, null, 4);
                document.getElementById('jsonOutput').value = formatted;
            } catch (e) {
                alert('Invalid JSON');
            }
        }

        function validateJSON() {
            const input = document.getElementById('jsonInput').value;
            try {
                JSON.parse(input);
                alert('Valid JSON');
            } catch (e) {
                alert('Invalid JSON');
            }
        }
    </script>
</body>
</html>
