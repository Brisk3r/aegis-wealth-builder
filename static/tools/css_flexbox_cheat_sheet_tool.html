<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Flexbox Playground - Aegis Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-accent: #3b82f6;
            --secondary-accent: #60a5fa;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
        }
        .glass { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            backdrop-filter: blur(12px); 
        }
        .btn-option { 
            transition: all 0.2s; 
            border: 1px solid var(--border-color); 
        }
        .btn-option.active { 
            background: var(--primary-accent); 
            border-color: var(--primary-accent); 
            color: white; 
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            background: #10b981;
            color: white;
            border-radius: 8px;
            transform: translateY(100px);
            transition: transform 0.3s;
            z-index: 1000;
        }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4750454395006570" crossorigin="anonymous"></script>

    <script defer src="/_vercel/insights/script.js"></script>

    <link rel="icon" type="image/png" href="/static/logo.png">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BZVWXPPG06"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BZVWXPPG06');
    </script>

    <script src="https://assets.lemonsqueezy.com/lemon.js" defer></script>
</head>
<body class="min-h-screen py-8">

    <div class="navbar" style="display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid rgba(255,255,255,0.08); background: rgba(11, 15, 25, 0.7); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; font-family: 'Outfit', sans-serif;">
        <a href="/" style="display: flex; align-items: center; gap: 10px; color: #f3f4f6; text-decoration: none; font-weight: 600;">
            <img src="/static/logo.png" alt="Aegis Hub Logo" style="height: 30px;">
            <span>Aegis Developer Hub</span>
        </a>
        <a href="/" style="color: #60a5fa; text-decoration: none; font-size: 0.95rem;">&larr; Back to Hub</a>
    </div>
    

    <div class="max-w-6xl mx-auto px-6">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-blue-600">Flexbox Visualizer</h1>
            <a href="/" class="text-sm font-semibold text-gray-400 hover:text-white transition">← Back to Hub</a>
        </header>

        <div class="grid lg:grid-cols-[380px,1fr] gap-8">
            <div class="glass p-6 rounded-2xl h-fit border transition hover:border-blue-500/30">
                <h2 class="text-lg font-semibold text-blue-400 mb-6 border-b border-white/5 pb-2">Properties</h2>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-[0.8rem] text-gray-400 font-bold uppercase tracking-wider mb-3">flex-direction</label>
                        <div class="grid grid-cols-2 gap-2" id="dir-group">
                            <button class="btn-option text-[0.8rem] rounded-lg p-2 active" onclick="setFlex('flex-direction', 'row', this)">row</button>
                            <button class="btn-option text-[0.8rem] rounded-lg p-2" onclick="setFlex('flex-direction', 'column', this)">column</button>
                            <button class="btn-option text-[0.8rem] rounded-lg p-2" onclick="setFlex('flex-direction', 'row-reverse', this)">row-rev</button>
                            <button class="btn-option text-[0.8rem] rounded-lg p-2" onclick="setFlex('flex-direction', 'column-reverse', this)">col-rev</button>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-[0.8rem] text-gray-400 font-bold uppercase tracking-wider mb-3">justify-content</label>
                        <div class="grid grid-cols-2 gap-2" id="justify-group">
                            <button class="btn-option text-[0.8rem] rounded-lg p-2 active" onclick="setFlex('justify-content', 'flex-start', this)">flex-start</button>
                            <button class="btn-option text-[0.8rem] rounded-lg p-2" onclick="setFlex('justify-content', 'flex-end', this)">flex-end</button>
                            <button class="btn-option text-[0.8rem] rounded-lg p-2" onclick="setFlex('justify-content', 'center', this)">center</button>
                            <button class="btn-option text-[0.8rem] rounded-lg p-2" onclick="setFlex('justify-content', 'space-between', this)">space-between</button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[0.8rem] text-gray-400 font-bold uppercase tracking-wider mb-3">align-items</label>
                        <div class="grid grid-cols-2 gap-2" id="align-group">
                            <button class="btn-option text-[0.8rem] rounded-lg p-2 active" onclick="setFlex('align-items', 'stretch', this)">stretch</button>
                            <button class="btn-option text-[0.8rem] rounded-lg p-2" onclick="setFlex('align-items', 'center', this)">center</button>
                            <button class="btn-option text-[0.8rem] rounded-lg p-2" onclick="setFlex('align-items', 'flex-start', this)">flex-start</button>
                            <button class="btn-option text-[0.8rem] rounded-lg p-2" onclick="setFlex('align-items', 'flex-end', this)">flex-end</button>
                        </div>
                    </div>
                    
                    <div class="pt-4 border-t border-white/5">
                        <label class="block text-[0.8rem] text-gray-400 font-bold uppercase tracking-wider mb-3">Item Count</label>
                        <input type="range" min="1" max="8" value="4" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer" oninput="updateItems(this.value)">
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="glass min-h-[400px] p-6 rounded-2xl flex border relative overflow-hidden" id="sandbox">
                    <div class="w-20 h-20 bg-blue-500 rounded-lg flex items-center justify-center font-bold shadow-lg shadow-blue-500/20">1</div>
                    <div class="w-20 h-24 bg-blue-600 rounded-lg flex items-center justify-center font-bold shadow-lg shadow-blue-600/20">2</div>
                    <div class="w-20 h-16 bg-blue-400 rounded-lg flex items-center justify-center font-bold shadow-lg shadow-blue-400/20">3</div>
                    <div class="w-20 h-20 bg-blue-700 rounded-lg flex items-center justify-center font-bold shadow-lg shadow-blue-700/20">4</div>
                </div>

                <div class="glass p-6 rounded-2xl relative">
                    <pre class="text-emerald-400 font-mono text-sm overflow-x-auto mb-4" id="css-text">.container {
  display: flex;
  flex-direction: row;
  justify-content: flex-start;
  align-items: stretch;
}</pre>
                    <div class="flex gap-3">
                        <button onclick="copyCSS()" class="bg-white/5 hover:bg-white/10 px-4 py-2 rounded-lg text-sm transition">Copy CSS</button>
                        <button onclick="downloadCSS()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm transition font-semibold">Download .css</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Copied to clipboard!</div>

    <script>
        const state = { 'flex-direction': 'row', 'justify-content': 'flex-start', 'align-items': 'stretch' };
        
        function setFlex(prop, val, btn) {
            Array.from(btn.parentElement.children).forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            state[prop] = val;
            const sandbox = document.getElementById('sandbox');
            sandbox.style[prop] = val;
            updateCSS();
        }

        function updateItems(num) {
            const sandbox = document.getElementById('sandbox');
            sandbox.innerHTML = '';
            for(let i=1; i<=num; i++) {
                const div = document.createElement('div');
                div.className = 'w-20 bg-blue-' + (500 + (i%3)*100) + ' rounded-lg flex items-center justify-center font-bold';
                div.style.minHeight = (60 + (i*10)%80) + 'px';
                div.textContent = i;
                sandbox.appendChild(div);
            }
        }

        function updateCSS() {
            document.getElementById('css-text').textContent = `.container {\n  display: flex;\n  flex-direction: ${state['flex-direction']};\n  justify-content: ${state['justify-content']};\n  align-items: ${state['align-items']};\n}`;
        }

        function copyCSS() {
            navigator.clipboard.writeText(document.getElementById('css-text').textContent);
            const toast = document.getElementById('toast');
            toast.style.transform = 'translateY(0)';
            setTimeout(() => toast.style.transform = 'translateY(100px)', 2000);
        }

        function downloadCSS() {
            const blob = new Blob([document.getElementById('css-text').textContent], {type: 'text/css'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'styles.css';
            a.click();
        }
    </script>
</body>
</html>
