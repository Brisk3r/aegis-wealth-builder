<html lang="en">
<head>

    <meta charset="UTF-8">

    <title>Visual CSS Flexbox Playground - Aegis Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-accent: #3b82f6;
            --secondary-accent: #60a5fa;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(11, 15, 25, 0.7);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
        }
        .back-link {
            color: var(--secondary-accent) !important;
            font-size: 0.95rem;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
        }
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
        }
        .panel h2 {
            margin-top: 0;
            font-size: 1.4rem;
            color: var(--secondary-accent);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .control-group {
            margin-bottom: 20px;
        }
        .control-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .btn-option {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-option:hover {
            border-color: var(--secondary-accent);
            background: rgba(59, 130, 246, 0.1);
        }
        .btn-option.active {
            background: var(--primary-accent);
            border-color: var(--primary-accent);
            color: white;
        }
        .sandbox-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .flex-sandbox {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            min-height: 350px;
            display: flex;
            padding: 20px;
            transition: all 0.3s;
        }
        .flex-box {
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            border-radius: 8px;
            min-width: 80px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
            font-size: 1.2rem;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            transition: all 0.2s;
        }
        .css-output {
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            color: #34d399;
            overflow-x: auto;
            position: relative;
        }
        .copy-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .sponsored-box {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.05), transparent);
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 12px;
            padding: 20px;
            margin-top: 30px;
            text-align: center;
        }
        .sponsored-box h3 {
            margin-top: 0;
            color: var(--secondary-accent);
        }
        .btn-buy {
            display: inline-block;
            background: var(--primary-accent);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .btn-buy:hover {
            background: #2563eb;
        }
    </style>

    <script defer src="/_vercel/insights/script.js"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4750454395006570" crossorigin="anonymous"></script>

    <link rel="icon" type="image/png" href="/static/logo.png">

<body>
    <div class="navbar">
        <a href="/" style="display: flex; align-items: center; gap: 10px;">
            <img src="/static/logo.png" alt="Aegis Hub Logo" style="height: 30px;">
            <span>Aegis Developer Hub</span>
        </a>
        <a href="/" class="back-link">&larr; Back to Hub</a>
    </div>
    <div class="container">
        <div class="panel">
            <h2>Controls</h2>
            <div class="control-group">
                <label>flex-direction</label>
                <div class="btn-group" id="dir-group">
                    <button class="btn-option active" onclick="setFlex('flex-direction', 'row', this)">row</button>
                    <button class="btn-option" onclick="setFlex('flex-direction', 'column', this)">column</button>
                    <button class="btn-option" onclick="setFlex('flex-direction', 'row-reverse', this)">row-reverse</button>
                    <button class="btn-option" onclick="setFlex('flex-direction', 'column-reverse', this)">column-reverse</button>
                </div>
            </div>
            
            <div class="control-group">
                <label>justify-content</label>
                <div class="btn-group" id="justify-group">
                    <button class="btn-option active" onclick="setFlex('justify-content', 'flex-start', this)">flex-start</button>
                    <button class="btn-option" onclick="setFlex('justify-content', 'flex-end', this)">flex-end</button>
                    <button class="btn-option" onclick="setFlex('justify-content', 'center', this)">center</button>
                    <button class="btn-option" onclick="setFlex('justify-content', 'space-between', this)">space-between</button>
                    <button class="btn-option" onclick="setFlex('justify-content', 'space-around', this)">space-around</button>
                    <button class="btn-option" onclick="setFlex('justify-content', 'space-evenly', this)">space-evenly</button>
                </div>
            </div>

            <div class="control-group">
                <label>align-items</label>
                <div class="btn-group" id="align-group">
                    <button class="btn-option active" onclick="setFlex('align-items', 'stretch', this)">stretch</button>
                    <button class="btn-option" onclick="setFlex('align-items', 'flex-start', this)">flex-start</button>
                    <button class="btn-option" onclick="setFlex('align-items', 'flex-end', this)">flex-end</button>
                    <button class="btn-option" onclick="setFlex('align-items', 'center', this)">center</button>
                    <button class="btn-option" onclick="setFlex('align-items', 'baseline', this)">baseline</button>
                </div>
            </div>

            <div class="control-group">
                <label>flex-wrap</label>
                <div class="btn-group" id="wrap-group">
                    <button class="btn-option active" onclick="setFlex('flex-wrap', 'nowrap', this)">nowrap</button>
                    <button class="btn-option" onclick="setFlex('flex-wrap', 'wrap', this)">wrap</button>
                    <button class="btn-option" onclick="setFlex('flex-wrap', 'wrap-reverse', this)">wrap-reverse</button>
                </div>
            </div>
        </div>
        
        <div class="sandbox-area">
            <div class="panel" style="flex-grow: 1; display: flex; flex-direction: column;">
                <h2>Interactive Sandbox</h2>
                <div class="flex-sandbox" id="sandbox">
                    <div class="flex-box">1</div>
                    <div class="flex-box" style="min-height: 120px; min-width: 90px;">2</div>
                    <div class="flex-box" style="min-height: 60px;">3</div>
                    <div class="flex-box">4</div>
                </div>
            </div>
            
            <div class="css-output">
                <button class="copy-btn" onclick="copyCSS()">Copy CSS</button>
                <pre id="css-text">.container {
    display: flex;
    flex-direction: row;
    justify-content: flex-start;
    align-items: stretch;
    flex-wrap: nowrap;
}</pre>
            </div>
        </div>
    </div>
<script>
        const state = {
            'display': 'flex',
            'flex-direction': 'row',
            'justify-content': 'flex-start',
            'align-items': 'stretch',
            'flex-wrap': 'nowrap'
        };
        
        function setFlex(prop, val, btn) {
            // Update active state in UI
            const siblings = btn.parentElement.children;
            for(let sib of siblings) {
                sib.classList.remove('active');
            }
            btn.classList.add('active');
            
            // Update sandbox
            state[prop] = val;
            const sandbox = document.getElementById('sandbox');
            sandbox.style[prop] = val;
            
            // Update output
            updateCSS();
        }
        
        function updateCSS() {
            const out = document.getElementById('css-text');
            out.textContent = `.container {
    display: flex;
    flex-direction: ${state['flex-direction']};
    justify-content: ${state['justify-content']};
    align-items: ${state['align-items']};
    flex-wrap: ${state['flex-wrap']};
}`;
        }
        
        function copyCSS() {
            const text = document.getElementById('css-text').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = 'Copy CSS', 1500);
            });
        }
    </script>
</body>
</html>
