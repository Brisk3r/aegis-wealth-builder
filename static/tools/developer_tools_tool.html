<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTool Niche Ideator</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #38bdf8; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 2rem; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; }
        .card { background: var(--card); padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155; }
        h1 { margin-top: 0; color: var(--accent); }
        .niche { margin: 1.5rem 0; padding: 1rem; border-left: 4px solid var(--accent); background: rgba(255,255,255,0.03); cursor: pointer; transition: 0.2s; }
        .niche:hover { background: rgba(255,255,255,0.08); }
        .details { display: none; margin-top: 1rem; font-size: 0.9rem; color: #94a3b8; }
    </style>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-accent: #3b82f6;
            --secondary-accent: #60a5fa;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }
        body {
            background-color: var(--bg-color) !important;
            color: var(--text-main) !important;
            font-family: 'Outfit', sans-serif !important;
        }
    </style>
</head>

<body>

    <div class="navbar" style="display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid rgba(255,255,255,0.08); background: rgba(11, 15, 25, 0.7); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; font-family: 'Outfit', sans-serif;">
        <a href="/" style="display: flex; align-items: center; gap: 10px; color: #f3f4f6; text-decoration: none; font-weight: 600;">
            <img src="/static/logo.png" alt="Aegis Hub Logo" style="height: 30px;">
            <span>Aegis Developer Hub</span>
        </a>
        <a href="/" style="color: #60a5fa; text-decoration: none; font-size: 0.95rem;">&larr; Back to Hub</a>
    </div>
    
    <div class="container">
        <div class="card">
            <h1>Dev Niche Ideator</h1>
            <p>Select a sub-niche to view monetization potential & strategy:</p>
            <div id="niches"></div>
        </div>
    </div>
    <script>
        const data = [
            { title: "AI Documentation Maintenance", desc: "Syncs README/Swagger with Git diffs.", strat: "Target: SaaS teams with frequent releases. Monetization: Monthly subscription." },
            { title: "Dev Environment Syncing", desc: "Unified Docker/DevContainer standards.", strat: "Target: CTOs/Lead Engineers. Monetization: Team-based licensing." },
            { title: "Niche API Monitoring", desc: "Specialized tests for Stripe/Shopify.", strat: "Target: E-commerce devs. Monetization: Tiered API call limits." }
        ];
        const container = document.getElementById('niches');
        data.forEach((item, i) => {
            const el = document.createElement('div');
            el.className = 'niche';
            el.innerHTML = `<strong>${item.title}</strong><div class="details" id="d-${i}">${item.desc}<br><br><em>Strategy: ${item.strat}</em></div>`;
            el.onclick = () => {
                const d = document.getElementById(`d-${i}`);
                d.style.display = d.style.display === 'block' ? 'none' : 'block';
            };
            container.appendChild(el);
        });
    </script>

    <div class="sponsored-box" style="background: linear-gradient(135deg, rgba(59, 130, 246, 0.05), transparent); border: 1px solid rgba(59, 130, 246, 0.15); border-radius: 12px; padding: 25px; margin: 40px auto; max-width: 600px; text-align: center; font-family: 'Outfit', sans-serif;">
        <h3 style="margin-top: 0; color: #60a5fa; font-size: 1.3rem;">SaaS Boilerplate</h3>
        <p style="font-size: 0.9rem; color: #9ca3af; margin-bottom: 15px;">Launch in 24h with a pre-configured Next.js, Tailwind, and Supabase starter kit.</p>
        <a href="https://aegisdev.lemonsqueezy.com/checkout/buy/saas-boilerplate" class="lemonsqueezy-button" style="display: inline-block; background: #3b82f6; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; transition: background 0.2s;">Get Offer ($29.00)</a>
    </div>
    <script src="https://assets.lemonsqueezy.com/lemon.js" defer></script>
    
</body>
</html>
