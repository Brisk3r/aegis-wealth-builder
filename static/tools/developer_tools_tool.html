<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTools Research Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: #f1f5f9; }
        .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4750454395006570" crossorigin="anonymous"></script>

    <script defer src="/_vercel/insights/script.js"></script>

    <link rel="icon" type="image/png" href="/static/logo.png">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BZVWXPPG06"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BZVWXPPG06');
    </script>

    <script src="https://assets.lemonsqueezy.com/lemon.js" defer></script>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="navbar" style="display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid rgba(255,255,255,0.08); background: rgba(11, 15, 25, 0.7); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; font-family: 'Outfit', sans-serif;">
        <a href="/" style="display: flex; align-items: center; gap: 10px; color: #f3f4f6; text-decoration: none; font-weight: 600;">
            <img src="/static/logo.png" alt="Aegis Hub Logo" style="height: 30px;">
            <span>Aegis Developer Hub</span>
        </a>
        <a href="/" style="color: #60a5fa; text-decoration: none; font-size: 0.95rem;">&larr; Back to Hub</a>
    </div>
    
    <div class="max-w-xl w-full glass rounded-3xl p-8 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-sky-500 to-indigo-500"></div>
        
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold gradient-text mb-2">Research Analysis</h1>
            <p class="text-slate-400 font-light">Configure your priority research queue</p>
        </header>

        <section class="space-y-6">
            <div class="flex items-center gap-4 bg-slate-950/50 p-4 rounded-2xl border border-amber-500/20">
                <div class="p-3 bg-amber-500/10 rounded-xl text-amber-500">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                </div>
                <div>
                    <h3 class="font-semibold text-slate-100 italic">Quota Reset Pending</h3>
                    <p class="text-xs text-slate-500">System will automatically trigger analysis upon network recovery.</p>
                </div>
            </div>

            <div class="space-y-3">
                <label class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Select Focus Categories</label>
                <div id="tags" class="flex flex-wrap gap-2">
                    <button onclick="toggleTag(this)" class="px-4 py-2 bg-slate-800 rounded-xl text-sm hover:bg-sky-600 transition-all border border-slate-700">AI-Assisted Coding</button>
                    <button onclick="toggleTag(this)" class="px-4 py-2 bg-slate-800 rounded-xl text-sm hover:bg-sky-600 transition-all border border-slate-700">DevOps Automation</button>
                    <button onclick="toggleTag(this)" class="px-4 py-2 bg-slate-800 rounded-xl text-sm hover:bg-sky-600 transition-all border border-slate-700">API Documentation</button>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Add Custom Focus</label>
                <div class="flex gap-2">
                    <input id="input" type="text" placeholder="e.g. Cloud Security..." class="flex-1 bg-slate-950 border border-slate-700 px-4 py-3 rounded-xl text-sm focus:outline-none focus:border-sky-500 transition">
                    <button onclick="addTag()" class="bg-indigo-600 px-6 py-3 rounded-xl text-sm font-semibold hover:bg-indigo-500 transition shadow-lg">Save</button>
                </div>
            </div>
        </section>

        <section class="mt-8 pt-8 border-t border-slate-700/50">
            <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Current Queue State (Persistent)</h2>
            <div id="queue" class="flex flex-wrap gap-2">
                <span class="text-slate-600 italic text-sm">No focus tags identified.</span>
            </div>
        </section>
    </div>

    <script>
        const selectedTags = new Set();
        
        function toggleTag(el) {
            el.classList.toggle('bg-sky-600');
            el.classList.toggle('border-sky-500');
            el.classList.toggle('bg-slate-800');
            
            if (el.classList.contains('bg-sky-600')) {
                selectedTags.add(el.innerText.trim());
            } else {
                selectedTags.delete(el.innerText.trim());
            }
            renderQueue();
        }

        function addTag() {
            const input = document.getElementById('input');
            const val = input.value.trim();
            if (!val || selectedTags.has(val)) return;
            
            const btn = document.createElement('button');
            btn.className = 'px-4 py-2 bg-sky-600 rounded-xl text-sm border border-sky-500 transition-all hover:bg-sky-500';
            btn.innerText = val;
            btn.onclick = function() { toggleTag(this); };
            document.getElementById('tags').appendChild(btn);
            
            selectedTags.add(val);
            input.value = '';
            renderQueue();
        }

        function renderQueue() {
            const queueEl = document.getElementById('queue');
            if (selectedTags.size === 0) {
                queueEl.innerHTML = '<span class="text-slate-600 italic text-sm">No focus tags identified.</span>';
            } else {
                queueEl.innerHTML = '';
                selectedTags.forEach(tag => {
                    const pill = document.createElement('div');
                    pill.className = 'px-3 py-1 bg-slate-900 border border-slate-700 rounded-lg text-xs text-sky-400';
                    pill.innerText = tag;
                    queueEl.appendChild(pill);
                });
            }
        }
    </script>
</body>
</html>
