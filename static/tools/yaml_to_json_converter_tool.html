<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConfigValidator Pro | IaC Security & Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: #f1f5f9; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .code-font { font-family: 'Fira Code', monospace; font-size: 13px; }
        textarea { resize: none; }
        .navbar { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4750454395006570" crossorigin="anonymous"></script>

    <script defer src="/_vercel/insights/script.js"></script>

    <link rel="icon" type="image/png" href="/static/logo.png">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BZVWXPPG06"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BZVWXPPG06');
    </script>

    <script src="https://assets.lemonsqueezy.com/lemon.js" defer></script>
</head>
<body class="min-h-screen">

    <nav class="navbar sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center font-bold">C</div>
            <span class="text-xl font-bold tracking-tight">ConfigValidator</span>
        </div>
        <div class="text-xs text-slate-500 hidden sm:block">Offline-First Engine Active</div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-white">Infrastructure Intelligence</h1>
            <p class="text-slate-400 mt-1">Convert YAML to JSON and validate against security best practices entirely in your browser.</p>
        </header>

        <div class="grid md:grid-cols-2 gap-6">
            <section class="flex flex-col gap-3">
                <div class="flex justify-between items-center">
                    <label class="text-sm font-semibold text-slate-300 uppercase tracking-wider">Input YAML</label>
                    <span id="yaml-status" class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-slate-800 text-slate-400 border border-slate-700">AWAITING INPUT</span>
                </div>
                <textarea id="inputArea" spellcheck="false" class="w-full h-[450px] p-5 rounded-2xl glass code-font focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-slate-200" placeholder="apiVersion: apps/v1&#10;kind: Deployment&#10;metadata:&#10;  name: secure-app..."></textarea>
            </section>

            <section class="flex flex-col gap-3">
                <div class="flex justify-between items-center">
                    <label class="text-sm font-semibold text-slate-300 uppercase tracking-wider">Output JSON</label>
                    <button onclick="copyToClipboard()" class="text-[10px] uppercase font-bold px-3 py-1 bg-indigo-600 hover:bg-indigo-500 rounded-full transition text-white">Copy JSON</button>
                </div>
                <div id="outputArea" class="w-full h-[450px] p-5 rounded-2xl glass code-font text-indigo-300 overflow-auto whitespace-pre-wrap border border-slate-700/50"></div>
            </section>
        </div>

        <section class="mt-8 p-6 rounded-3xl glass">
            <h2 class="text-lg font-semibold mb-6 flex items-center gap-3">
                <span class="w-1.5 h-6 bg-indigo-500 rounded-full"></span>
                Security & Schema Audit
            </h2>
            <div id="insights" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="p-4 rounded-xl bg-slate-900/50 border border-white/5">
                    <p class="text-[10px] uppercase tracking-widest text-slate-500">Node Count</p>
                    <p id="nodes" class="text-xl font-bold mt-1 text-slate-200">0</p>
                </div>
                <div class="p-4 rounded-xl bg-slate-900/50 border border-white/5">
                    <p class="text-[10px] uppercase tracking-widest text-slate-500">Identified Schema</p>
                    <p id="format" class="text-sm mt-1 font-medium text-slate-200 truncate">Unknown</p>
                </div>
                <div class="p-4 rounded-xl bg-slate-900/50 border border-white/5">
                    <p class="text-[10px] uppercase tracking-widest text-slate-500">Risk Severity</p>
                    <p id="risks" class="text-sm mt-1 font-medium text-emerald-400">Clear</p>
                </div>
                <div class="p-4 rounded-xl bg-slate-900/50 border border-white/5 flex items-center justify-center">
                    <div id="status-icon" class="w-3 h-3 rounded-full bg-slate-600"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const inputArea = document.getElementById('inputArea');
        const outputArea = document.getElementById('outputArea');
        const yamlStatus = document.getElementById('yaml-status');
        const nodesEl = document.getElementById('nodes');
        const formatEl = document.getElementById('format');
        const risksEl = document.getElementById('risks');
        const statusIcon = document.getElementById('status-icon');

        inputArea.addEventListener('input', processData);

        function processData() {
            const raw = inputArea.value.trim();
            if (!raw) {
                resetView();
                return;
            }

            try {
                const parsed = jsyaml.load(raw);
                const json = JSON.stringify(parsed, null, 4);
                
                outputArea.textContent = json;
                yamlStatus.textContent = "VALID YAML";
                yamlStatus.className = "text-[10px] font-bold px-2 py-0.5 rounded-full bg-emerald-900/50 text-emerald-400 border border-emerald-800";
                statusIcon.className = "w-3 h-3 rounded-full bg-emerald-500 animate-pulse";
                
                analyze(parsed);
            } catch (e) {
                yamlStatus.textContent = "SYNTAX ERROR";
                yamlStatus.className = "text-[10px] font-bold px-2 py-0.5 rounded-full bg-red-900/50 text-red-400 border border-red-800";
                statusIcon.className = "w-3 h-3 rounded-full bg-red-500";
                outputArea.textContent = "Parser Error: " + e.message;
                nodesEl.textContent = "X";
            }
        }

        function analyze(data) {
            const jsonStr = JSON.stringify(data);
            const flatData = jsonStr.toLowerCase();
            
            // Heuristic node count
            nodesEl.textContent = (jsonStr.match(/:/g) || []).length;

            // Schema Detection
            if (flatData.includes('apiVersion') || flatData.includes('kind: deployment')) formatEl.textContent = "K8s Manifest";
            else if (flatData.includes('resource') || flatData.includes('terraform')) formatEl.textContent = "Terraform";
            else formatEl.textContent = "General YAML";

            // Security Audit
            let alertCount = 0;
            if (flatData.includes('password') || flatData.includes('token') || flatData.includes('secret') || flatData.includes('aws_access_key')) alertCount++;
            if (flatData.includes('privileged: true') || flatData.includes('runasuser: 0')) alertCount++;
            
            if (alertCount > 0) {
                risksEl.textContent = alertCount + " Critical Finding(s)";
                risksEl.className = "text-sm mt-1 font-bold text-amber-400";
            } else {
                risksEl.textContent = "Clean";
                risksEl.className = "text-sm mt-1 font-medium text-emerald-400";
            }
        }

        function resetView() {
            outputArea.textContent = "";
            yamlStatus.textContent = "AWAITING INPUT";
            yamlStatus.className = "text-[10px] font-bold px-2 py-0.5 rounded-full bg-slate-800 text-slate-400 border border-slate-700";
            statusIcon.className = "w-3 h-3 rounded-full bg-slate-600";
            nodesEl.textContent = "0";
            formatEl.textContent = "Unknown";
            risksEl.textContent = "Clear";
            risksEl.className = "text-sm mt-1 font-medium text-emerald-400";
        }

        function copyToClipboard() {
            if (!outputArea.textContent) return;
            navigator.clipboard.writeText(outputArea.textContent);
            const btn = document.querySelector('button');
            const originalText = btn.textContent;
            btn.textContent = "COPIED!";
            setTimeout(() => btn.textContent = originalText, 1500);
        }
    </script>
</body>
</html>
