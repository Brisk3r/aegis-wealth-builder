<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Breakpoint Tester | Aegis Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #080b11;
            color: #f3f4f6;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.04) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(99, 102, 241, 0.03) 0%, transparent 40%);
            background-attachment: fixed;
        }
        .glass-card {
            background: rgba(17, 24, 39, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        input[type="text"] {
            color: #f8fafc !important;
            background-color: rgba(15, 23, 42, 0.6) !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
        }
        input::placeholder {
            color: #64748b !important;
        }
        iframe {
            background: #ffffff;
            border-radius: 12px;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
    </style>
    <!-- AdSense & Analytics tags -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4750454395006570" crossorigin="anonymous"></script>
    <script defer src="/_vercel/insights/script.js"></script>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BZVWXPPG06"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BZVWXPPG06');
    </script>

    <style>
        /* Global accessibility & dark theme input fixes */
        input[type="text"], input[type="url"], input[type="number"], input[type="email"], input[type="password"], input[type="date"], select, textarea {
            color: #f8fafc !important;
        }
        input::placeholder, textarea::placeholder {
            color: #64748b !important;
            opacity: 0.8 !important;
        }
    </style>
    

    <script src="https://assets.lemonsqueezy.com/lemon.js" defer></script>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <!-- Sticky Navigation Bar -->
    <div class="navbar" style="display: flex; justify-content: space-between; align-items: center; padding: 18px 40px; border-bottom: 1px solid rgba(255,255,255,0.08); background: rgba(8, 11, 17, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; font-family: 'Outfit', sans-serif;">
        <a href="/" style="display: flex; align-items: center; gap: 10px; color: #f3f4f6; text-decoration: none; font-weight: 600;">
            <img src="/static/logo.png" alt="Aegis Hub Logo" style="height: 30px;">
            <span>Aegis Developer Hub</span>
        </a>
        <a href="/" style="color: #60a5fa; text-decoration: none; font-size: 0.95rem; font-weight: 500;">&larr; Back to Hub</a>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-20 right-6 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- Main Container -->
    <main class="max-w-7xl w-full mx-auto px-4 py-8 flex-grow flex flex-col">
        
        <!-- Controls Bar -->
        <div class="glass-card rounded-3xl p-5 border border-white/5 mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
            
            <div class="flex items-center gap-3 flex-grow max-w-xl">
                <input type="text" id="urlInput" placeholder="Enter URL to test (e.g. https://aegishub.dev)" value="https://aegishub.dev" class="w-full px-4 py-2.5 rounded-xl text-xs font-mono">
                <button onclick="loadUrl()" class="px-5 py-2.5 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold text-xs shadow-lg transition-all">
                    Test URL
                </button>
            </div>

            <!-- Viewport Buttons -->
            <div class="flex flex-wrap items-center gap-2">
                <button onclick="resizeViewport(375, 667, 'iPhone Mobile')" class="px-3 py-1.5 rounded-xl bg-slate-900 border border-white/10 text-xs font-semibold text-gray-300 hover:text-white">Mobile (375px)</button>
                <button onclick="resizeViewport(768, 1024, 'Tablet IPad')" class="px-3 py-1.5 rounded-xl bg-slate-900 border border-white/10 text-xs font-semibold text-gray-300 hover:text-white">Tablet (768px)</button>
                <button onclick="resizeViewport(1280, 800, 'Laptop')" class="px-3 py-1.5 rounded-xl bg-slate-900 border border-white/10 text-xs font-semibold text-gray-300 hover:text-white">Laptop (1280px)</button>
                <button onclick="resizeViewport('100%', '600px', 'Full Width')" class="px-3 py-1.5 rounded-xl bg-slate-900 border border-white/10 text-xs font-semibold text-gray-300 hover:text-white">Full Width</button>
                <button onclick="copyMediaQueries()" class="px-3 py-1.5 rounded-xl bg-slate-800 hover:bg-slate-700 text-blue-400 font-semibold text-xs border border-white/10">Copy Media Query</button>
            </div>

        </div>

        <!-- Viewport Container -->
        <div class="flex-grow flex flex-col items-center justify-center space-y-3 mb-8">
            <div class="text-xs font-bold text-gray-400 uppercase tracking-wider">
                Current Viewport: <span id="viewport-dim-label" class="text-blue-400 font-mono">100% Width</span>
            </div>

            <div id="wrapper" class="w-full h-[650px] transition-all duration-300 glass-card p-2 rounded-2xl border border-white/10 shadow-2xl overflow-hidden flex items-center justify-center">
                <iframe id="previewFrame" src="https://aegishub.dev" class="w-full h-full rounded-xl shadow-xl" sandbox="allow-forms allow-scripts allow-same-origin allow-popups"></iframe>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer style="text-align: center; padding: 60px 20px; color: #9ca3af; border-top: 1px solid rgba(255,255,255,0.08); font-size: 0.95rem; background: rgba(8, 11, 17, 0.4); font-family: 'Outfit', sans-serif; margin-top: 60px;">
        <p>&copy; 2026 Aegis Developer Hub. All rights reserved.</p>
        <p style="font-size: 0.85rem; max-width: 800px; margin: 15px auto; line-height: 1.5; color: #9ca3af;">
            <strong>Disclaimer:</strong> Responsive Breakpoint Tester runs client-side inside iframe sandbox. Conforms to APPs, GDPR, and privacy guidelines.
        </p>
        <p style="margin-top: 20px;">
            <a href="/static/privacy.html" style="color: #9ca3af; text-decoration: underline; margin-right: 15px;">Privacy Policy</a>
            <a href="/static/terms.html" style="color: #9ca3af; text-decoration: underline;">Terms of Service & Disclaimer</a>
        </p>
    </footer>

    <!-- JavaScript Engine -->
    <script>
        let currentWidth = '100%';

        function loadUrl() {
            let url = document.getElementById('urlInput').value.trim();
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            document.getElementById('previewFrame').src = url;
            showToast(`Loaded ${url}`);
        }

        function resizeViewport(width, height, label) {
            const wrapper = document.getElementById('wrapper');
            const dimLabel = document.getElementById('viewport-dim-label');

            if (typeof width === 'number') {
                wrapper.style.maxWidth = `${width}px`;
                dimLabel.textContent = `${label} (${width}px x ${height}px)`;
                currentWidth = `${width}px`;
            } else {
                wrapper.style.maxWidth = '100%';
                dimLabel.textContent = `${label} (100% Width)`;
                currentWidth = '100%';
            }

            showToast(`Switched to ${label}`);
        }

        function copyMediaQueries() {
            const query = `@media (min-width: ${currentWidth}) {\n  /* Your responsive styles here */\n}`;
            navigator.clipboard.writeText(query).then(() => {
                showToast('Copied CSS Media Query snippet!');
            });
        }

        function showToast(message, type = 'blue') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `px-4 py-2.5 rounded-xl glass-card text-xs font-semibold text-white shadow-2xl border border-white/10 flex items-center gap-2 transition-all duration-300 transform translate-x-5 opacity-0`;
            toast.innerHTML = `
                <span class="w-2 h-2 rounded-full ${type === 'rose' ? 'bg-rose-400' : 'bg-blue-400'}"></span>
                <span>${escapeHtml(message)}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-x-5', 'opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-x-5');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
