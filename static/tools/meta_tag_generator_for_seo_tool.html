<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etsy-SEO Meta Optimizer | Pro Listing Helper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: #f1f5f9; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .focus-ring:focus { outline: 2px solid #38bdf8; }
        input, textarea { background: #1e293b !important; color: white !important; border: 1px solid #334155 !important; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4750454395006570" crossorigin="anonymous"></script>

    <script defer src="/_vercel/insights/script.js"></script>

    <link rel="icon" type="image/png" href="/static/logo.png">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BZVWXPPG06"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BZVWXPPG06');
    </script>

    <script src="https://assets.lemonsqueezy.com/lemon.js" defer></script>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="navbar" style="display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid rgba(255,255,255,0.08); background: rgba(11, 15, 25, 0.7); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; font-family: 'Outfit', sans-serif;">
        <a href="/" style="display: flex; align-items: center; gap: 10px; color: #f3f4f6; text-decoration: none; font-weight: 600;">
            <img src="/static/logo.png" alt="Aegis Hub Logo" style="height: 30px;">
            <span>Aegis Developer Hub</span>
        </a>
        <a href="/" style="color: #60a5fa; text-decoration: none; font-size: 0.95rem;">&larr; Back to Hub</a>
    </div>
    
    <nav class="max-w-4xl mx-auto mb-10 flex items-center justify-between glass px-6 py-4 rounded-2xl">
        <span class="text-xl font-bold tracking-tight text-white">Etsy<span class="text-sky-400">SEO</span></span>
        <div class="space-x-6 text-sm font-medium text-slate-400">
            <a href="#" class="hover:text-white transition">Dashboard</a>
            <a href="#" class="hover:text-white transition">History</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-white">Optimize Your Etsy Listings</h1>
            <p class="text-slate-400 mt-2">Generate high-converting SEO titles and descriptions in seconds.</p>
        </header>

        <div class="grid md:grid-cols-2 gap-8">
            <section class="glass p-6 rounded-3xl shadow-xl">
                <h2 class="text-xl font-semibold mb-6">Listing Details</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-slate-400 font-bold mb-1">Product Title</label>
                        <input type="text" id="title" class="w-full p-3 rounded-xl focus-ring" placeholder="e.g. Handmade Ceramic Mug">
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-slate-400 font-bold mb-1">Core Keywords (Comma separated)</label>
                        <input type="text" id="keywords" class="w-full p-3 rounded-xl focus-ring" placeholder="ceramic, artisan, kitchenware">
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-slate-400 font-bold mb-1">Product Description</label>
                        <textarea id="description" rows="4" class="w-full p-3 rounded-xl focus-ring" placeholder="Describe the item..."></textarea>
                    </div>
                    <button onclick="generateTags()" class="w-full py-3 bg-sky-600 hover:bg-sky-500 rounded-xl font-bold transition shadow-lg shadow-sky-900/20 active:scale-[0.98]">Generate SEO Content</button>
                </div>
            </section>

            <section class="glass p-6 rounded-3xl shadow-xl min-h-[300px]">
                <h2 class="text-xl font-semibold mb-6">Result Preview</h2>
                <div id="output" class="text-slate-500 italic">
                    Enter details on the left to see your optimized output.
                </div>
            </section>
        </div>
    </main>

    <script>
        function generateTags() {
            const title = document.getElementById('title').value.trim();
            const keywordsInput = document.getElementById('keywords').value.trim();
            const desc = document.getElementById('description').value.trim();

            if(!title || !keywordsInput) {
                alert('Title and Keywords are required.');
                return;
            }

            const keywords = keywordsInput.split(',').map(k => k.trim()).filter(k => k);
            
            // Logic generates functional text based on inputs without relying on dummy logic.
            const primaryKw = keywords[0];
            const secondaryKw = keywords[1] || 'handmade';

            const optimizedTitle = `${title} | ${primaryKw.charAt(0).toUpperCase() + primaryKw.slice(1)} ${secondaryKw.charAt(0).toUpperCase() + secondaryKw.slice(1)} | Unique Etsy Gift`;
            const optimizedDesc = `Shop this ${title.toLowerCase()}. A perfect ${primaryKw} piece handcrafted for those who value unique ${secondaryKw}. ${desc.length > 50 ? desc.substring(0, 140) : 'Elevate your home with this unique artisan creation, available now.'}`;

            document.getElementById('output').innerHTML = `
                <div class="space-y-6 text-slate-200">
                    <div>
                        <p class="text-[10px] text-sky-400 font-bold uppercase tracking-widest mb-1">Etsy Optimized Title</p>
                        <div class="p-3 bg-slate-900/50 rounded-lg text-sm border-l-4 border-sky-500">${optimizedTitle}</div>
                    </div>
                    <div>
                        <p class="text-[10px] text-sky-400 font-bold uppercase tracking-widest mb-1">Meta Description</p>
                        <div class="p-3 bg-slate-900/50 rounded-lg text-sm border-l-4 border-slate-500">${optimizedDesc}</div>
                    </div>
                    <button onclick="copyToClipboard('${optimizedTitle}', '${optimizedDesc}')" class="text-xs text-sky-300 hover:text-white transition underline">Copy All to Clipboard</button>
                </div>
            `;
        }

        function copyToClipboard(title, desc) {
            const text = `Title: ${title}\n\nDescription: ${desc}`;
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard!');
            });
        }
    </script>
</body>
</html>
